name: Build & Push Docker Image

on:
    push:
        branches: [ 'dev', 'dev/**' , 'test/**' ]
        tags: [ 'v*' ]
        paths-ignore:
          - 'docs/**'
    workflow_dispatch:
        inputs:
            no-cache:
                description: 'Build without cache'
                required: false
                type: boolean
                default: false

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Compute tags and labels
  # ──────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    if: github.actor != 'dependabot[bot]' && github.actor != 'github-actions[bot]'
    permissions:
      contents: read
    outputs:
      tags: ${{ steps.docker-meta.outputs.tags }}
      labels: ${{ steps.docker-meta.outputs.labels }}
    steps:
    - uses: actions/checkout@v4

    - name: Compute version metadata
      id: version-check
      run: |
        # Check for major version release (vX.0.0)
        is_major="false"
        if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
          version="${GITHUB_REF#refs/tags/}"
          if [[ "$version" =~ ^v[0-9]+\.0\.0$ ]]; then
            is_major="true"
            echo "🎉 Major version release detected: ${version}"
          fi
        fi
        echo "is_major_release=${is_major}" >> $GITHUB_OUTPUT

        # Compute branch-sha tag for branch pushes (e.g., dev-a1b2c3d4)
        if [[ "$GITHUB_REF" == refs/heads/* ]]; then
          branch=$(echo "${GITHUB_REF#refs/heads/}" | tr '/' '-' | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]._-')
          short_sha=$(echo "$GITHUB_SHA" | cut -c1-8)
          echo "branch_sha=${branch}-${short_sha}" >> $GITHUB_OUTPUT
        fi

    - name: Generate Docker metadata
      id: docker-meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ vars.REPO_ADDRESS }}/${{ vars.REPO_USER }}/${{ vars.REPO_NAME }}
        tags: |
          # Version tag push: apply version + latest (+ latest-major if vX.0.0)
          type=semver,pattern=v{{version}}
          type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          type=raw,value=latest-major,enable=${{ steps.version-check.outputs.is_major_release == 'true' }}
          # Branch push: apply branch name + branch-sha (e.g., dev, dev-a1b2c3d4)
          type=ref,event=branch
          type=raw,value=${{ steps.version-check.outputs.branch_sha }},enable=${{ github.ref_type != 'tag' }}
        labels: |
          org.opencontainers.image.title=game-thumbs
          org.opencontainers.image.description=Dynamic sports thumbnail and logo generation API
          org.opencontainers.image.licenses=MIT
          org.opencontainers.image.authors=Seth WV
          org.opencontainers.image.url=https://github.com/sethwv/game-thumbs
          org.opencontainers.image.source=https://github.com/sethwv/game-thumbs
          org.opencontainers.image.documentation=https://sethwv.github.io/game-thumbs

    - name: Display build information
      run: |
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Docker Image: ${{ vars.REPO_ADDRESS }}/${{ vars.REPO_USER }}/${{ vars.REPO_NAME }}"
        echo "Tags to be applied:"
        echo "${{ steps.docker-meta.outputs.tags }}" | while read -r tag; do
          echo "  • ${tag##*:}"
        done
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

  # ──────────────────────────────────────────────
  # Job 2: Build each platform in parallel
  # ──────────────────────────────────────────────
  build:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        platform:
          - linux/amd64
          - linux/arm64
    steps:
    - uses: actions/checkout@v4

    - name: Prepare platform slug
      id: platform
      run: |
        platform="${{ matrix.platform }}"
        echo "slug=${platform//\//-}" >> $GITHUB_OUTPUT

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.REPO_ADDRESS }}
        username: ${{ vars.REPO_USER }}
        password: ${{ secrets.REPO_TOKEN }}

    - name: Build and push by digest
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        platforms: ${{ matrix.platform }}
        labels: ${{ needs.prepare.outputs.labels }}
        outputs: type=image,"name=${{ vars.REPO_ADDRESS }}/${{ vars.REPO_USER }}/${{ vars.REPO_NAME }}",push-by-digest=true,name-canonical=true,push=true,oci-mediatypes=true
        cache-from: ${{ inputs.no-cache != true && format('type=gha,scope=buildx-{0}', steps.platform.outputs.slug) || '' }}
        cache-to: ${{ inputs.no-cache != true && format('type=gha,scope=buildx-{0},mode=max', steps.platform.outputs.slug) || '' }}
        provenance: false

    - name: Export digest
      run: |
        mkdir -p $RUNNER_TEMP/digests
        digest="${{ steps.build.outputs.digest }}"
        touch "$RUNNER_TEMP/digests/${digest#sha256:}"

    - name: Upload digest
      uses: actions/upload-artifact@v4
      with:
        name: digests-${{ steps.platform.outputs.slug }}
        path: ${{ runner.temp }}/digests/*
        if-no-files-found: error
        retention-days: 1

  # ──────────────────────────────────────────────
  # Job 3: Create multi-platform manifest and push
  # ──────────────────────────────────────────────
  manifest:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Download digests
      uses: actions/download-artifact@v4
      with:
        path: ${{ runner.temp }}/digests
        pattern: digests-*
        merge-multiple: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ vars.REPO_ADDRESS }}
        username: ${{ vars.REPO_USER }}
        password: ${{ secrets.REPO_TOKEN }}

    - name: Create and push manifest
      run: |
        REPO="${{ vars.REPO_ADDRESS }}/${{ vars.REPO_USER }}/${{ vars.REPO_NAME }}"

        # Build -t arguments from metadata-action tags (full image references)
        TAG_ARGS=()
        while read -r tag; do
          [ -n "$tag" ] && TAG_ARGS+=(-t "$tag")
        done <<< "${{ needs.prepare.outputs.tags }}"

        # Build source image references from digest files
        SOURCES=()
        for digest_file in ${{ runner.temp }}/digests/*; do
          SOURCES+=("${REPO}@sha256:$(basename $digest_file)")
        done

        # Create and push the multi-platform manifest
        docker buildx imagetools create \
          "${TAG_ARGS[@]}" \
          --annotation "index:org.opencontainers.image.description=Dynamic sports thumbnail and logo generation API" \
          --annotation "index:org.opencontainers.image.source=https://github.com/sethwv/game-thumbs" \
          --annotation "index:org.opencontainers.image.url=https://github.com/sethwv/game-thumbs" \
          --annotation "index:org.opencontainers.image.title=game-thumbs" \
          --annotation "index:org.opencontainers.image.licenses=MIT" \
          "${SOURCES[@]}"

    - name: Inspect manifest
      run: |
        REPO="${{ vars.REPO_ADDRESS }}/${{ vars.REPO_USER }}/${{ vars.REPO_NAME }}"

        # Get first tag for inspection
        PRIMARY_TAG=$(echo "${{ needs.prepare.outputs.tags }}" | head -n1)

        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        echo "Inspecting ${PRIMARY_TAG}"
        echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        docker buildx imagetools inspect "${PRIMARY_TAG}"
